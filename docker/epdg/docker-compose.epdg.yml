# Standalone compose for the VoWiFi ePDG tunnel. Kept separate from the main
# docker/docker-compose.yml (which is host-networked) so `docker compose up`
# never brings this experimental service up alongside the production bridge.
#
# Run from the repo root (the build context the Dockerfile needs to see the
# whole Cargo workspace, not just docker/epdg/):
#
#   docker compose -f docker/epdg/docker-compose.epdg.yml up --build
#
# `docker compose up --build` alone produces a fully working image — the
# gsm-sip-bridge binary (real, statically-linked PJSIP; see Dockerfile's
# builder stage) is baked in at build time. Only config.toml is provided at
# run time, via the bind mount below; put yours at docker/epdg/config.toml
# (gitignored, same as the repo root's config.toml) with [vowifi] enabled.
services:
  epdg-tunnel:
    build:
      context: ../..
      dockerfile: docker/epdg/Dockerfile
    image: gsm-sip-bridge-epdg:latest
    container_name: epdg-tunnel
    # Network isolated from the host: a dedicated bridge network gives the
    # container its own netns; the dialer nests tunnel routes inside an internal
    # "ims" netns on top of that.
    networks:
      - epdg-net
    cap_add:
      - NET_ADMIN   # create/configure tun + program routes; also covers the
                    # veth pair entrypoint.sh creates for the VoWiFi bridge
                    # agents (specs/011-vowifi-sip-bridge) — no extra
                    # capability needed beyond what the tunnel already grants.
      - NET_RAW     # user-space ESP over raw sockets + UDP/500,4500
      - SYS_ADMIN   # `ip netns add`/`exec` (bind-mounts + setns)
    # The default docker-default AppArmor profile denies `mount --make-shared`
    # even with CAP_SYS_ADMIN, which `ip netns add` requires. Capabilities stay
    # minimal (no --privileged); this only lifts the AppArmor mount restriction.
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/net/tun
      - /dev/ttyUSB6:/dev/ttyUSB6   # EC200U AT port for AT+CIMI / AT+CSIM (EAP-AKA)
    group_add:
      - dialout
    volumes:
      # Your [vowifi]-enabled config.toml, read-only. entrypoint.sh checks
      # for exactly this path before launching vowifi-ims-agent/
      # vowifi-sip-agent — omit this mount (or point CONFIG_HOST_PATH at a
      # missing file) to run the tunnel alone, same as before this file existed.
      - "${CONFIG_HOST_PATH:-./config.toml}:/etc/gsm-sip-bridge/config.toml:ro"
    env_file:
      - path: .env
        required: false
    environment:
      MCC: "${MCC:-404}"
      MNC: "${MNC:-043}"
      APN: "${APN:-ims}"
      MODEM_PORT: "${MODEM_PORT:-/dev/ttyUSB6}"
      EPDG_IP: "${EPDG_IP:-}"
      EPDG_FQDN: "${EPDG_FQDN:-}"
      NETNS: "${NETNS:-ims}"
      SRC_ADDR: "${SRC_ADDR:-}"
      KEEPALIVE_INTERVAL: "${KEEPALIVE_INTERVAL:-20}"
    restart: "no"          # experimental — don't auto-loop into failures
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3

networks:
  epdg-net:
    driver: bridge
