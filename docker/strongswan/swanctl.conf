# /etc/swanctl/swanctl.conf — the fork's own default is an empty file,
# which means `swanctl --load-conns`/`--load-all` finds nothing at all
# (confirmed by testing: "no files found matching '/etc/swanctl/
# swanctl.conf'" even with a real connection dropped into conf.d/).
# swanctl.conf's own `include` directive is what actually pulls
# conf.d/epdg.conf (rendered by docker/entrypoint.sh at runtime, from
# swanctl-epdg.conf.template) into the loaded configuration.
include conf.d/*.conf
