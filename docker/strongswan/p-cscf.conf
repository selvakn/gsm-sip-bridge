# strongswan.d/charon/p-cscf.conf — the osmocom fork's P-CSCF plugin
# requests the carrier's P-CSCF address(es) via the IKE config-payload
# attribute (CPRQ ... PCSCF4/PCSCF6), which is what makes the fork usable
# for ePDG/VoWiFi at all (upstream strongSwan has no such request). Loaded
# only for the "ims" connection (research.md item 1).
p-cscf {
    load = yes

    enable {
        ims = yes
    }
}
