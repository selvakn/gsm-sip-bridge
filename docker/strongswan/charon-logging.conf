# strongswan.d/charon-logging.conf — filelog for the strongSwan ePDG engine
# (specs/012-strongswan-epdg). entrypoint.sh watches this file for tunnel
# readiness (CHILD_SA established) and P-CSCF assignment ("received P-CSCF
# server IP"), the same technique it already uses on the SWu-IKEv2 dialer's
# stdout log — see research.md item 4.
#
# Reset on every charon start (not appended across restarts), matching
# /tmp/swu.log's behavior for the legacy engine.
charon {
    filelog {
        # "charon" here is an arbitrary label, not the file path — the
        # actual path is the nested `path =` key. A bare or quoted file
        # path as the section name itself does not parse (confirmed by
        # testing against this build: both "unexpected ." on an unquoted
        # path and "unexpected string detected" on a quoted one — the
        # path-as-label form from the osmocom wiki's older example no
        # longer matches this strongSwan version's grammar; this labeled
        # form is documented in strongswan.conf(5)'s own example).
        charon {
            path = /tmp/charon.log
            default = 1
            ike = 1
            cfg = 1
            append = no
            flush_line = yes
            ike_name = yes
            time_format = %Y-%m-%d %H:%M:%S
        }
    }
    syslog {
        daemon {
            ike = 1
        }
    }
}
