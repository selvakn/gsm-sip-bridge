# strongswan.d/charon-extra.conf — reliability tuning for the ePDG engine
# (specs/012-strongswan-epdg, research.md items 3/9). This is the
# capability Option 1 (the SWu-IKEv2 Python dialer) structurally lacked:
# charon keeps retrying/re-establishing indefinitely rather than giving up.
#
# install_virtual_ip = no: we manage the tunnel interface's address
# ourselves via ims.updown inside network namespace "ims" (research.md
# item 3's XFRM-interface design) — letting charon install the negotiated
# address on its own (default-namespace) interface would fight that.
#
# retry_initiate_interval: how long charon waits before retrying a failed
# IKE_SA initiation. Paired with keyingtries=0 (unlimited retries) on the
# "ims" connection itself (see swanctl-epdg.conf.template) for FR-004's
# "no bounded retry count that gives up permanently".
charon {
    install_virtual_ip = no
    retry_initiate_interval = 10

    # The fork's own default /etc/strongswan.conf sets load_modular = yes,
    # which inverts plugin-loading semantics from "load unless a conf file
    # says load = no" to "load only if a conf file says load = yes (or a
    # numeric priority)". Since every plugin conf file this build installs
    # is an empty placeholder (no explicit `load =` line), load_modular=yes
    # silently loads *nothing* — confirmed by testing: charon aborted at
    # startup with "critical plugin 'charon' has unmet dependency:
    # NONCE_GEN" (the nonce/random/hmac/openssl plugins never loaded).
    # We already curate the plugin set at configure time
    # (--disable-defaults + explicit --enable-*), so the classic
    # load-everything-unless-disabled model is exactly what's wanted here;
    # no per-plugin conf edits needed.
    load_modular = no
}
